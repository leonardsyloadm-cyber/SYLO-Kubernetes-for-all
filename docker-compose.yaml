version: '3.8'

services:
  # --- 1. SERVIDOR WEB (PHP + Apache + Cliente Docker) ---
  web:
    build: ./sylo-web
    container_name: sylo-web
    ports:
      - "8000:80"

    # Puente mágico para que PHP hable con el Host (tu Linux)
    extra_hosts:
      - "host.docker.internal:host-gateway"

    volumes:
      - ./sylo-web:/var/www/html
      - ./sylo-web/buzon-pedidos:/buzon
      - /var/run/docker.sock:/var/run/docker.sock # Para que PHP pueda usar Docker
    depends_on:
      - sylo-admin-mysql
    networks:
      - sylo-network

  # --- 2. BASE DE DATOS DEL GESTOR (MySQL Clásico para usuarios/pedidos) ---
  sylo-admin-mysql:
    image: mysql:5.7
    container_name: sylo-admin-mysql
    environment:
      MYSQL_DATABASE: sylo_admin_db
      MYSQL_USER: sylo_app
      MYSQL_PASSWORD: sylo_app_pass
      MYSQL_ROOT_PASSWORD: SyloRoot!2026Secure
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - ./sylo-web/Sylo_db.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/mysql
    networks:
      - sylo-network

  # --- 3. NUEVO: KYLO DB ENGINE (Tu Motor Java Propio) ---
  kylo-db:
    build: ./Kylo # Busca el Dockerfile dentro de la carpeta Kylo
    container_name: kylo-db-core
    ports:
      - "8082:8080" # Mapeamos la GUI de Kylo al puerto 8082 de tu PC
      - "5000:5000" # Puerto de datos TCP de Kylo
    networks:
      - sylo-network # Se conecta a la misma red para hablar con la web si hace falta
    restart: unless-stopped

  # --- 4. SIEM Ecosistema (Loki y Grafana) ---
  loki:
    image: grafana/loki:3.0.0
    container_name: loki-siem
    ports:
      - "3100:3100"
    volumes:
      - ./Cerebro/loki-config.yaml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - sylo-network

  grafana:
    image: grafana/grafana:10.2.2
    container_name: grafana-siem
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    ports:
      - "3000:3000"
    volumes:
      - ./Cerebro/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
    networks:
      - sylo-network
    depends_on:
      - loki

volumes:
  db_data:


networks:
  sylo-network:
    driver: bridge
